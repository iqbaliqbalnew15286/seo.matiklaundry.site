name: Deploy Laravel React to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM and Build React
        run: |
          npm ci
          npm run build

      - name: Deploy via LFTP (Stable)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -c "
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 60;
            mirror -R \
              -x ^vendor/ \
              -x ^node_modules/ \
              -x ^\.git/ \
              -x ^\.github/ \
              -x ^\.env$ \
              -x ^\.env\.example$ \
              -x ^tests/ \
              -x ^storage/logs/ \
              -x ^storage/framework/cache/ \
              -x ^storage/framework/sessions/ \
              -x ^storage/framework/views/ \
              --only-newer --no-perms --verbose . public_html/seo/;
            bye
          "