name: Deploy Laravel React to Hostinger

on:
  push:
    branches:
      - main 

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' 

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM and Build React
        run: |
          npm ci
          npm run build

      - name: Sync files to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/seo/
          force-passive: true
          timeout: 300000
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/node_modules/**
            resources/js/**
            resources/css/**
            tests/**
            storage/logs/**
            storage/framework/cache/data/**
            storage/framework/sessions/**
            storage/framework/views/**
            .env
            .env.example
            readme.md
            README.md
            phpunit.xml
            vite.config.js
            tailwind.config.js
            postcss.config.js
            package.json
            package-lock.json
            .editorconfig
            .gitattributes