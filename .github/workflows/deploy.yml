name: Deploy Laravel React to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install NPM and Build React
        run: |
          npm ci
          npm run build

      - name: Prepare deployment archive
        run: |
          DEPLOY_TOKEN=$(openssl rand -hex 32)
          echo "$DEPLOY_TOKEN" > .deploy_token
          echo "DEPLOY_TOKEN=$DEPLOY_TOKEN" >> $GITHUB_ENV

          # Remove unnecessary files from vendor to reduce zip size
          find vendor -type d -name "tests" -o -name "Tests" -o -name "test" -o -name "docs" -o -name "doc" -o -name "examples" -o -name "example" | xargs rm -rf 2>/dev/null || true
          find vendor -name "*.md" -o -name "CHANGELOG*" -o -name "LICENSE*" -o -name "CONTRIBUTING*" -o -name ".travis.yml" -o -name ".editorconfig" | xargs rm -f 2>/dev/null || true

          zip -qr /tmp/deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x ".env" \
            -x ".env.example" \
            -x ".deploy_token" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/data/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "phpunit.xml" \
            -x "vite.config.js" \
            -x "tailwind.config.js" \
            -x "postcss.config.js" \
            -x "package.json" \
            -x "package-lock.json" \
            -x ".editorconfig" \
            -x ".gitattributes" \
            -x ".gitignore" \
            -x ".npmrc" \
            -x "README.md"

          ZIP_SIZE=$(du -sh /tmp/deploy.zip | cut -f1)
          echo "✅ Archive size: $ZIP_SIZE"

      - name: Upload via FTP (curl)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Setup .netrc for secure FTP auth
          echo "machine ${FTP_SERVER} login ${FTP_USER} password ${FTP_PASS}" > ~/.netrc
          chmod 600 ~/.netrc

          FTP_URL="ftp://${FTP_SERVER}/public_html/seo"

          echo "📤 [1/3] Uploading extractor script..."
          curl --netrc --ftp-pasv --ftp-create-dirs --insecure \
            -T public/_deploy.php "${FTP_URL}/public/_deploy.php" \
            --connect-timeout 30 --max-time 60 --retry 3 --retry-delay 5 -s
          echo "   ✓ Done"

          echo "📤 [2/3] Uploading deploy token..."
          curl --netrc --ftp-pasv --insecure \
            -T .deploy_token "${FTP_URL}/.deploy_token" \
            --connect-timeout 30 --max-time 60 --retry 3 --retry-delay 5 -s
          echo "   ✓ Done"

          echo "📤 [3/3] Uploading deploy.zip..."
          curl --netrc --ftp-pasv --insecure \
            -T /tmp/deploy.zip "${FTP_URL}/deploy.zip" \
            --connect-timeout 30 --max-time 600 --retry 3 --retry-delay 10 \
            --speed-limit 1024 --speed-time 30 \
            --progress-bar
          echo "   ✓ Done"

          rm -f ~/.netrc

      - name: Extract archive on server
        run: |
          echo "📦 Extracting on server..."
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            "https://seo.matiklaundry.site/_deploy.php" \
            -d "token=${{ env.DEPLOY_TOKEN }}" \
            --max-time 120 --retry 2 --retry-delay 5 --insecure) || {
            echo "⚠️ HTTPS failed, trying HTTP..."
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
              "http://seo.matiklaundry.site/_deploy.php" \
              -d "token=${{ env.DEPLOY_TOKEN }}" \
              --max-time 120 --retry 2 --retry-delay 5)
          }

          RESPONSE=$(cat /tmp/response.txt)
          echo "Server response (HTTP $HTTP_CODE): $RESPONSE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Deploy successful!"
          else
            echo "❌ Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi